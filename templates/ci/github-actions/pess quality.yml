name: PESS Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pess-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Memory Bank exists
        run: |
          if [ ! -d "memory-bank" ]; then
            echo "::warning ::No memory-bank directory found — skip PESS checks"
            exit 0
          fi

      - name: Validate Memory Bank structure
        run: |
          REQUIRED="activeContext.md session-notes.md progress.md"
          MISSING=""
          for f in $REQUIRED; do
            [ -f "memory-bank/$f" ] || MISSING="$MISSING $f"
          done
          if [ -n "$MISSING" ]; then
            echo "::error ::Missing Memory Bank files:$MISSING"
            exit 1
          fi
          echo "Memory Bank structure: OK"

      - name: Validate memory-bank/activeContext.md timestamp
        run: |
          if [ -f "memory-bank/activeContext.md" ]; then
            LAST_UPDATE=$(grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}" memory-bank/activeContext.md | head -1)
            if [ -z "$LAST_UPDATE" ]; then
              echo "::warning ::activeContext.md has no ISO timestamp"
            else
              echo "activeContext.md last updated: $LAST_UPDATE"
            fi
          fi

      - name: Validate CLAUDE.md exists
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "::error ::CLAUDE.md not found in project root"
            exit 1
          fi
          echo "CLAUDE.md: OK"

      - name: Validate constitution.md if present
        run: |
          if [ -f "memory-bank/constitution.md" ]; then
            echo "Constitution found — all commits must respect it"
          fi

      - name: Validate no hardcoded secrets
        run: |
          SECRET_PATTERNS="password\s*=\s*['\"][^'\"]{4,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|api[_-]?key\s*=\s*['\"][^'\"]{8,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|token\s*=\s*['\"][^'\"]{10,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|sk-[A-Za-z0-9]{20,}"

          FOUND=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" \) \
            -not -path "./node_modules/*" \
            -not -path "./.venv/*" \
            -exec grep -Pl "$SECRET_PATTERNS" {} \; 2>/dev/null | head -5 || true)

          if [ -n "$FOUND" ]; then
            echo "::error ::Possible hardcoded secrets found in:"
            echo "$FOUND"
            exit 1
          fi
          echo "Secret scan: OK"

      - name: Validate no absolute paths in code
        run: |
          ABS_PATH_PATTERNS="[A-Z]:\\\\[a-zA-Z]|/home/|/usr/local/"
          FOUND=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" -o -name "*.sh" \) \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            -exec grep -Pl "$ABS_PATH_PATTERNS" {} \; 2>/dev/null | head -5 || true)
          if [ -n "$FOUND" ]; then
            echo "::warning ::Possible hardcoded absolute paths in:"
            echo "$FOUND"
          else
            echo "Absolute path check: OK"
          fi

      - name: Run project tests
        run: |
          # Detect project type and run appropriate tests
          if [ -f "package.json" ]; then
            # Detect JS test framework
            if grep -q '"test":.*vitest' package.json; then
              echo "Detected: Vitest"
              npm test -- --run --reporter=verbose 2>&1 | tee /tmp/vitest-output.txt
              if grep -q "failed\|error\|FAIL" /tmp/vitest-output.txt; then
                echo "::error ::Vitest tests failed"
                exit 1
              fi
            elif grep -q '"test":.*jest' package.json; then
              echo "Detected: Jest"
              npm test 2>&1 | tee /tmp/jest-output.txt
              if grep -q "FAIL\|Tests:.*failed" /tmp/jest-output.txt; then
                echo "::error ::Jest tests failed"
                exit 1
              fi
            elif grep -q '"test":.*mocha' package.json; then
              echo "Detected: Mocha"
              npm test 2>&1 | tee /tmp/mocha-output.txt
              if grep -q "failing\|Error" /tmp/mocha-output.txt; then
                echo "::error ::Mocha tests failed"
                exit 1
              fi
            else
              echo "Detected: package.json but unknown test framework — skip"
            fi
          elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "Detected: Python (pytest)"
            pip install -q pytest pytest-cov 2>/dev/null
            # Find test dir
            TEST_DIR="tests"
            [ -d "test" ] && TEST_DIR="test"
            pytest $TEST_DIR/ -v --tb=short --cov-report=term-missing 2>&1 | tee /tmp/pytest-output.txt
            if grep -q "FAILED\|ERROR\|1 failed\|[1-9][0-9]* failed" /tmp/pytest-output.txt; then
              echo "::error ::pytest tests failed"
              exit 1
            fi
          else
            echo "No test framework detected — skip"
          fi

      - name: Summary
        run: |
          echo "## PESS Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Memory Bank structure: OK" >> $GITHUB_STEP_SUMMARY
          echo "- CLAUDE.md: OK" >> $GITHUB_STEP_SUMMARY
          echo "- No hardcoded secrets: OK" >> $GITHUB_STEP_SUMMARY
          echo "- No absolute paths: OK" >> $GITHUB_STEP_SUMMARY