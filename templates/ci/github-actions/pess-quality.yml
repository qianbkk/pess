name: PESS Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pess-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Memory Bank exists
        run: |
          if [ ! -d "memory-bank" ]; then
            echo "::warning ::No memory-bank directory found — skip PESS checks"
            exit 0
          fi

      - name: Validate Memory Bank structure
        run: |
          REQUIRED="activeContext.md session-notes.md"
          MISSING=""
          for f in $REQUIRED; do
            [ -f "memory-bank/$f" ] || MISSING="$MISSING $f"
          done
          if [ -n "$MISSING" ]; then
            echo "::error ::Missing Memory Bank files:$MISSING"
            exit 1
          fi
          echo "Memory Bank structure: OK"

      - name: Validate memory-bank/activeContext.md is not stale
        run: |
          if [ -f "memory-bank/activeContext.md" ]; then
            LAST_UPDATE=$(grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}" memory-bank/activeContext.md | head -1)
            if [ -z "$LAST_UPDATE" ]; then
              echo "::warning ::activeContext.md has no timestamp"
            else
              echo "activeContext.md last updated: $LAST_UPDATE"
            fi
          fi

      - name: Validate CLAUDE.md exists
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "::error ::CLAUDE.md not found in project root"
            exit 1
          fi
          echo "CLAUDE.md: OK"

      - name: Validate constitution.md if present
        run: |
          if [ -f "memory-bank/constitution.md" ]; then
            echo "Constitution found — all commits must respect it"
            # Quick check: no bypass comments in recent changes
            RECENT_BYPASS=$(git log -5 --oneline --all --source --remotes -- \
              2>/dev/null | wc -l)
            echo "Recent commit activity: $RECENT_BYPASS commits checked"
          fi

      - name: Validate no hardcoded secrets
        run: |
          # Check for common hardcoded secret patterns
          SECRET_PATTERNS="password\s*=\s*['\"][^'\"]{4,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|api[_-]?key\s*=\s*['\"][^'\"]{8,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|token\s*=\s*['\"][^'\"]{10,}['\"]"
          SECRET_PATTERNS="$SECRET_PATTERNS|sk-[A-Za-z0-9]{20,}"

          FOUND=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" \) \
            -not -path "./node_modules/*" \
            -not -path "./.venv/*" \
            -exec grep -Pl "$SECRET_PATTERNS" {} \; 2>/dev/null | head -5 || true)

          if [ -n "$FOUND" ]; then
            echo "::error ::Possible hardcoded secrets found in:"
            echo "$FOUND"
            exit 1
          fi
          echo "Secret scan: OK"

      - name: Validate no absolute paths in code
        run: |
          ABS_PATH_PATTERNS="[A-Z]:\\\\[a-zA-Z]|/home/|/usr/local/"
          FOUND=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" -o -name "*.sh" \) \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            -exec grep -Pl "$ABS_PATH_PATTERNS" {} \; 2>/dev/null | head -5 || true)
          if [ -n "$FOUND" ]; then
            echo "::warning ::Possible hardcoded absolute paths in:"
            echo "$FOUND"
          else
            echo "Absolute path check: OK"
          fi

      - name: Detect test framework
        id: detect-framework
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"test".*"vitest\|"test".*"vitest' package.json; then
              echo "framework=vitest" >> $GITHUB_OUTPUT
            elif grep -q '"test".*"jest\|"test".*"jest' package.json; then
              echo "framework=jest" >> $GITHUB_OUTPUT
            elif grep -q '"test".*"mocha\|"test".*"mocha' package.json; then
              echo "framework=mocha" >> $GITHUB_OUTPUT
            else
              echo "framework=npm-test" >> $GITHUB_OUTPUT
            fi
          elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "framework=pytest" >> $GITHUB_OUTPUT
          elif [ -f "Cargo.toml" ]; then
            echo "framework=cargo" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "framework=go" >> $GITHUB_OUTPUT
          else
            echo "framework=none" >> $GITHUB_OUTPUT
          fi
          echo "Detected: ${{ steps.detect-framework.outputs.framework }}"

      - name: Run tests (Vitest)
        if: steps.detect-framework.outputs.framework == 'vitest'
        run: npm test -- --run || exit 1

      - name: Run tests (Jest)
        if: steps.detect-framework.outputs.framework == 'jest'
        run: npm test || exit 1

      - name: Run tests (Mocha)
        if: steps.detect-framework.outputs.framework == 'mocha'
        run: npm test || exit 1

      - name: Run tests (npm test)
        if: steps.detect-framework.outputs.framework == 'npm-test'
        run: npm test || exit 1

      - name: Run tests (pytest)
        if: steps.detect-framework.outputs.framework == 'pytest'
        run: |
          pip install -q pytest pytest-cov
          pytest tests/ test/ -v --tb=short || exit 1

      - name: Run tests (Cargo)
        if: steps.detect-framework.outputs.framework == 'cargo'
        run: cargo test || exit 1

      - name: Run tests (Go)
        if: steps.detect-framework.outputs.framework == 'go'
        run: go test ./... || exit 1

      - name: Validate STATUS.md (OPT-014)
        if: hashFiles('STATUS.md') != ''
        run: |
          if [ -f "scripts/validate_status.py" ]; then
            python scripts/validate_status.py STATUS.md || exit 1
            echo "STATUS.md validation: OK"
          else
            echo "::warning ::scripts/validate_status.py not found — skipping"
          fi

      - name: Check progress.md staleness (OPT-020)
        if: hashFiles('memory-bank/progress.md') != ''
        run: |
          if [ -f "memory-bank/progress.md" ]; then
            LAST_UPDATE=$(grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}" memory-bank/progress.md | head -1)
            if [ -n "$LAST_UPDATE" ]; then
              LAST_TS=$(date -d "$LAST_UPDATE" +%s 2>/dev/null || echo 0)
              NOW=$(date +%s)
              DIFF=$(( (NOW - LAST_TS) / 86400 ))
              if [ "$DIFF" -gt 7 ]; then
                echo "::warning ::progress.md last updated $DIFF days ago (>$7 days) — 项目可能停滞"
              else
                echo "progress.md last updated $DIFF days ago"
              fi
            fi
          fi

      - name: Summary
        run: |
          echo "## PESS Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Memory Bank structure: ✓" >> $GITHUB_STEP_SUMMARY
          echo "- CLAUDE.md present: ✓" >> $GITHUB_STEP_SUMMARY
          echo "- No hardcoded secrets: ✓" >> $GITHUB_STEP_SUMMARY
          echo "- No absolute paths: ✓" >> $GITHUB_STEP_SUMMARY